name: E2E Tests - Game Management

on:
  workflow_dispatch:
  schedule:
    # Run daily at 9:00 JST (0:00 UTC)
    - cron: '0 0 * * *'

jobs:
  e2e-game:
    runs-on: ubuntu-latest
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @vote-board-game/web exec playwright install --with-deps chromium

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get AWS resources from CloudFormation
        id: aws-resources
        run: |
          # Use VoteBoardGameStack (no environment suffix in stack name)
          STACK_NAME="VoteBoardGameStack"
          echo "Getting outputs from stack: $STACK_NAME"

          # Check if stack exists
          if ! aws cloudformation describe-stacks --stack-name $STACK_NAME &> /dev/null; then
            echo "Error: Stack $STACK_NAME not found"
            exit 1
          fi

          # Output full stack information for debugging
          echo "=== Full CloudFormation Stack Output ==="
          aws cloudformation describe-stacks --stack-name $STACK_NAME
          echo "========================================="
          echo ""

          # Get all outputs
          API_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          TABLE_NAME=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='TableName'].OutputValue" --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)

          # Validate outputs
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "Error: API_URL is empty"
            exit 1
          fi

          if [ -z "$TABLE_NAME" ] || [ "$TABLE_NAME" = "None" ]; then
            echo "Error: TABLE_NAME is empty"
            exit 1
          fi

          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" = "None" ]; then
            echo "Error: USER_POOL_ID is empty"
            exit 1
          fi

          if [ -z "$USER_POOL_CLIENT_ID" ] || [ "$USER_POOL_CLIENT_ID" = "None" ]; then
            echo "Error: USER_POOL_CLIENT_ID is empty"
            exit 1
          fi

          echo "✓ API URL: $API_URL"
          echo "✓ Table Name: $TABLE_NAME"
          echo "✓ User Pool ID: $USER_POOL_ID"
          echo "✓ User Pool Client ID: $USER_POOL_CLIENT_ID"

          # Output for next steps
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "table-name=$TABLE_NAME" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Create .env file for E2E tests
        run: |
          cat > packages/web/.env.test << EOF
          BASE_URL=${{ vars.VERCEL_URL }}
          NEXT_PUBLIC_API_URL=${{ steps.aws-resources.outputs.api-url }}
          DYNAMODB_TABLE_NAME=${{ steps.aws-resources.outputs.table-name }}
          USER_POOL_ID=${{ steps.aws-resources.outputs.user-pool-id }}
          COGNITO_USER_POOL_ID=${{ steps.aws-resources.outputs.user-pool-id }}
          COGNITO_CLIENT_ID=${{ steps.aws-resources.outputs.user-pool-client-id }}
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          AWS_REGION=ap-northeast-1
          CI=true
          EOF

          echo "✓ Created .env.test file"
          echo ""
          echo "=== Environment Variables (masked) ==="
          echo "BASE_URL: ${{ vars.VERCEL_URL }}"
          echo "NEXT_PUBLIC_API_URL: ${{ steps.aws-resources.outputs.api-url }}"
          echo "DYNAMODB_TABLE_NAME: ${{ steps.aws-resources.outputs.table-name }}"
          echo "USER_POOL_ID: ${{ steps.aws-resources.outputs.user-pool-id }}"
          echo "COGNITO_USER_POOL_ID: ${{ steps.aws-resources.outputs.user-pool-id }}"
          echo "COGNITO_CLIENT_ID: ${{ steps.aws-resources.outputs.user-pool-client-id }}"
          echo "AWS_REGION: ap-northeast-1"
          echo "======================================"
          echo ""
          echo "=== .env.test file content (passwords masked) ==="
          cat packages/web/.env.test | sed 's/TEST_USER_PASSWORD=.*/TEST_USER_PASSWORD=***MASKED***/'
          echo "=================================================="

      - name: Run game management E2E tests
        run: |
          # Load environment variables from .env.test
          set -a
          source packages/web/.env.test
          set +a

          echo "=== Verifying environment variables are loaded ==="
          echo "NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}"
          echo "BASE_URL: ${BASE_URL}"
          echo "CI: ${CI}"
          echo "NODE_ENV: ${NODE_ENV}"
          echo "AWS_REGION: ${AWS_REGION}"
          echo "AWS credentials configured: $([ -n "$AWS_ACCESS_KEY_ID" ] && echo "Yes" || echo "No")"
          echo "=================================================="
          echo ""
          echo "=== Testing API URL accessibility ==="
          echo "Attempting to reach API at: ${NEXT_PUBLIC_API_URL}"
          if curl -f -s -o /dev/null -w "%{http_code}" "${NEXT_PUBLIC_API_URL}/api/games" > /tmp/api_status.txt 2>&1; then
            echo "✓ API is accessible, HTTP status: $(cat /tmp/api_status.txt)"
          else
            echo "✗ API is not accessible or returned error"
            echo "HTTP status: $(cat /tmp/api_status.txt)"
          fi
          echo "=================================================="
          echo ""
          echo "=== Testing Vercel deployment accessibility ==="
          echo "Attempting to reach Vercel at: ${BASE_URL}"
          if curl -f -s -o /dev/null -w "%{http_code}" "${BASE_URL}" > /tmp/vercel_status.txt 2>&1; then
            echo "✓ Vercel deployment is accessible, HTTP status: $(cat /tmp/vercel_status.txt)"
          else
            echo "✗ Vercel deployment is not accessible or returned error"
            echo "HTTP status: $(cat /tmp/vercel_status.txt)"
          fi
          echo "=================================================="

          pnpm --filter @vote-board-game/web test:e2e:game

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-game
          path: packages/web/playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-game
          path: packages/web/test-results/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = 'Game E2E tests completed. Check artifacts for details.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testResults
            });

name: E2E Tests - Game Management

on:
  workflow_run:
    workflows: ['CD (Development)', 'CD (Staging)', 'CD (Production)']
    types:
      - completed

jobs:
  e2e-game:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @vote-board-game/web exec playwright install --with-deps chromium

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get deployment outputs from CDK
        id: cdk-outputs
        run: |
          # Determine environment from workflow name
          WORKFLOW_NAME="${{ github.event.workflow_run.name }}"
          if [[ "$WORKFLOW_NAME" == *"Development"* ]]; then
            ENV="dev"
          elif [[ "$WORKFLOW_NAME" == *"Staging"* ]]; then
            ENV="stg"
          elif [[ "$WORKFLOW_NAME" == *"Production"* ]]; then
            ENV="prod"
          else
            ENV="dev"
          fi

          echo "Environment: $ENV"

          # Get stack outputs from CloudFormation
          STACK_NAME="VoteBoardGameStack-${ENV}"
          echo "Stack name: $STACK_NAME"

          # Check if stack exists
          if ! aws cloudformation describe-stacks --stack-name $STACK_NAME &> /dev/null; then
            echo "Error: Stack $STACK_NAME not found"
            exit 1
          fi

          # Debug: List all outputs
          echo "=== All Stack Outputs ==="
          aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs" --output json
          echo "=========================="

          API_URL=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          TABLE_NAME=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='TableName'].OutputValue" --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)

          # Validate outputs
          if [ -z "$TABLE_NAME" ] || [ "$TABLE_NAME" == "None" ]; then
            echo "Error: TABLE_NAME is empty or None"
            exit 1
          fi

          if [ -z "$USER_POOL_ID" ] || [ "$USER_POOL_ID" == "None" ]; then
            echo "Error: USER_POOL_ID is empty or None"
            exit 1
          fi

          if [ -z "$USER_POOL_CLIENT_ID" ] || [ "$USER_POOL_CLIENT_ID" == "None" ]; then
            echo "Error: USER_POOL_CLIENT_ID is empty or None"
            exit 1
          fi

          echo "API URL: $API_URL"
          echo "Table Name: $TABLE_NAME"
          echo "User Pool ID: $USER_POOL_ID"
          echo "User Pool Client ID: $USER_POOL_CLIENT_ID"

          echo "api-url=$API_URL" >> $GITHUB_OUTPUT
          echo "table-name=$TABLE_NAME" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Get Vercel URL
        id: vercel-url
        run: |
          VERCEL_URL="${{ vars.VERCEL_URL }}"
          if [ -z "$VERCEL_URL" ]; then
            echo "Error: VERCEL_URL variable not set"
            exit 1
          fi
          echo "url=$VERCEL_URL" >> $GITHUB_OUTPUT
          echo "Vercel URL: $VERCEL_URL"

      - name: Debug environment variables
        run: |
          echo "=== Environment Configuration ==="
          echo "BASE_URL: ${{ steps.vercel-url.outputs.url }}"
          echo "API_URL: ${{ steps.cdk-outputs.outputs.api-url }}"
          echo "TABLE_NAME: ${{ steps.cdk-outputs.outputs.table-name }}"
          echo "USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user-pool-id }}"
          echo "USER_POOL_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}"
          echo "AWS_REGION: ap-northeast-1"
          echo "================================"
          echo ""
          echo "=== Checking if outputs are empty ==="
          echo "table-name is empty: ${{ steps.cdk-outputs.outputs.table-name == '' }}"
          echo "user-pool-id is empty: ${{ steps.cdk-outputs.outputs.user-pool-id == '' }}"
          echo "user-pool-client-id is empty: ${{ steps.cdk-outputs.outputs.user-pool-client-id == '' }}"
          echo "================================"

      - name: Verify environment variables before test
        run: |
          echo "=== Verifying Environment Variables ==="
          echo "BASE_URL: $BASE_URL"
          echo "DYNAMODB_TABLE_NAME: $DYNAMODB_TABLE_NAME"
          echo "USER_POOL_ID: $USER_POOL_ID"
          echo "COGNITO_USER_POOL_ID: $COGNITO_USER_POOL_ID"
          echo "COGNITO_CLIENT_ID: $COGNITO_CLIENT_ID"
          echo "AWS_REGION: $AWS_REGION"
          echo "AWS_ACCESS_KEY_ID is set: $([[ -n \"$AWS_ACCESS_KEY_ID\" ]] && echo 'YES' || echo 'NO')"
          echo "AWS_SECRET_ACCESS_KEY is set: $([[ -n \"$AWS_SECRET_ACCESS_KEY\" ]] && echo 'YES' || echo 'NO')"
          echo "AWS_SESSION_TOKEN is set: $([[ -n \"$AWS_SESSION_TOKEN\" ]] && echo 'YES' || echo 'NO')"
          echo "========================================"
        env:
          BASE_URL: ${{ steps.vercel-url.outputs.url }}
          DYNAMODB_TABLE_NAME: ${{ steps.cdk-outputs.outputs.table-name }}
          USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user-pool-id }}
          COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user-pool-id }}
          COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}
          AWS_REGION: ap-northeast-1

      - name: Run game management E2E tests
        run: pnpm --filter @vote-board-game/web test:e2e:game
        env:
          BASE_URL: ${{ steps.vercel-url.outputs.url }}
          DYNAMODB_TABLE_NAME: ${{ steps.cdk-outputs.outputs.table-name }}
          USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user-pool-id }}
          COGNITO_USER_POOL_ID: ${{ steps.cdk-outputs.outputs.user-pool-id }}
          COGNITO_CLIENT_ID: ${{ steps.cdk-outputs.outputs.user-pool-client-id }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          AWS_REGION: ap-northeast-1
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-game
          path: packages/web/playwright-report/
          retention-days: 30

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-game
          path: packages/web/test-results/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testResults = 'Game E2E tests completed. Check artifacts for details.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testResults
            });

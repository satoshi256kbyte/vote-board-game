name: E2E Tests

on:
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @vote-board-game/web exec playwright install --with-deps ${{ matrix.browser }}

      - name: Build application
        run: pnpm --filter @vote-board-game/web build

      - name: Start application
        run: |
          pnpm --filter @vote-board-game/web start &
          echo $! > .app-pid
        env:
          NODE_ENV: production

      - name: Wait for application to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Get AWS resources for testing
        id: aws-resources
        run: |
          # Use VoteBoardGameStack (no environment suffix in stack name)
          STACK_NAME="VoteBoardGameStack"
          echo "Stack name: $STACK_NAME"

          # Check if stack exists
          if ! aws cloudformation describe-stacks --stack-name $STACK_NAME &> /dev/null; then
            echo "Error: Stack $STACK_NAME not found"
            exit 1
          fi

          # Output full stack information for debugging
          echo "=== Full CloudFormation Stack Output ==="
          aws cloudformation describe-stacks --stack-name $STACK_NAME
          echo "========================================="
          echo ""

          TABLE_NAME=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='TableName'].OutputValue" --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name $STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)

          echo "Table Name: $TABLE_NAME"
          echo "User Pool ID: $USER_POOL_ID"
          echo "User Pool Client ID: $USER_POOL_CLIENT_ID"

          echo "table-name=$TABLE_NAME" >> $GITHUB_OUTPUT
          echo "user-pool-id=$USER_POOL_ID" >> $GITHUB_OUTPUT
          echo "user-pool-client-id=$USER_POOL_CLIENT_ID" >> $GITHUB_OUTPUT

      - name: Run E2E tests
        run: pnpm --filter @vote-board-game/web test:e2e --project=${{ matrix.browser }}
        env:
          BASE_URL: http://localhost:3000
          CI: true
          AWS_REGION: ap-northeast-1
          USER_POOL_ID: ${{ steps.aws-resources.outputs.user-pool-id }}
          COGNITO_USER_POOL_ID: ${{ steps.aws-resources.outputs.user-pool-id }}
          COGNITO_CLIENT_ID: ${{ steps.aws-resources.outputs.user-pool-client-id }}
          DYNAMODB_TABLE_NAME: ${{ steps.aws-resources.outputs.table-name }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Stop application
        if: always()
        run: |
          if [ -f .app-pid ]; then
            kill $(cat .app-pid) || true
            rm .app-pid
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: packages/web/playwright-report/
          retention-days: 7

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: packages/web/test-results/
          retention-days: 7

  e2e-summary:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "E2E tests failed on one or more browsers"
            exit 1
          fi
          echo "All E2E tests passed!"
